cv:
  name: Bruno Pumapillo Sarmiento
  location: Lima, Perú
  email: thulobruno@gmail.com
  phone: +51 916 223 067
  website: https://brun0west.github.io/Brun0West/
  social_networks:
    - network: LinkedIn
      username: bruno-pumapillo-sarmiento
  custom_connections: []
  sections:
    Perfil Profesional:
      - >
        Estudiante de último año de Ingeniería de Software (UNMSM, tercio superior) y becario PRONABEC, especializado en Data Analytics y Business Intelligence.
        He desarrollado 3 proyectos académicos integrando pipelines ETL, modelado de Datamarts y dashboards con KPIs en Tableau y Power BI, incluyendo un sistema de BI para el Ministerio de Desarrollo Agrario (MIDAGRI).
        Competente en análisis de datos con Python (Pandas, NumPy), SQL y visualización de datos. Busco aplicar mis habilidades técnicas en una práctica preprofesional donde pueda aportar valor analítico en la toma de decisiones basada en datos.
    Educación:
      - institution: Universidad Nacional Mayor de San Marcos
        area: Ingeniería de Software
        degree: Ingeniería de Sistemas e Informática
        start_date: 2022-03
        end_date: 2026-12
        location: Lima, Perú
        highlights:
          - "Tercio Superior académico — Promedio destacado en cursos de Estadística, Bases de Datos y Análisis de Datos."
          - "Becario del Estado: Beca Permanencia - PRONABEC (desde 2023). Seleccionado por desempeño académico sobresaliente."
          - "Cursos relevantes: Análisis de Datos, Estadística Aplicada, Bases de Datos, Inteligencia Artificial, Ingeniería de Software."
    Proyectos Relevantes:
      - company: Sistema de Inteligencia de Negocios — MIDAGRI (Ministerio de Desarrollo Agrario)
        position: Data Engineer & BI Analyst
        start_date: 2024-04
        end_date: 2024-06
        highlights:
          - "Diseñé e implementé un Datamart en esquema estrella sobre Google Cloud Platform (GCP), integrando 28 fuentes heterogéneas de la Encuesta Nacional Agropecuaria (ENA) mediante procesos ETL en Pentaho Data Integration."
          - "Automaticé la limpieza y transformación de +500,000 registros, reduciendo significativamente el tiempo de preparación de datos frente al proceso manual y eliminando inconsistencias críticas entre fuentes."
          - "Desarrollé un dashboard interactivo en Tableau con 12 KPIs clave que permitió segmentar productores agropecuarios, facilitando la focalización de políticas públicas a nivel nacional."
      - company: Investigación en Machine Learning — Redes Neuronales Gráficas (GNNs)
        position: Data Scientist / Investigador en IA
        highlights:
          - "Implementé y comparé modelos de machine learning (GAT, GraphSAGE) en Python para análisis predictivo sobre grafos de +1M de nodos en redes moleculares y sociales."
          - "Optimicé el rendimiento de modelos mediante técnicas de muestreo (GraphSAINT), logrando una reducción del 40% en tiempo de entrenamiento sin pérdida significativa de precisión (accuracy >92%)."
          - "Realicé análisis exploratorio de datos (EDA) y visualización de métricas de rendimiento para la selección de hiperparámetros óptimos."
      - company: "SCARF: Sistema de Control de Asistencia con Reconocimiento Facial"
        position: Data Engineer & Backend Developer
        highlights:
          - "Diseñé el pipeline de datos completo (ingesta, limpieza, almacenamiento) para el procesamiento de +200 registros diarios de imágenes y datos de asistencia en Django REST Framework."
          - "Construí dashboards de monitoreo en tiempo real con visualizaciones estadísticas que eliminaron prácticamente los errores del registro manual de asistencia."
          - "Implementé consultas SQL optimizadas para la generación de reportes automatizados de KPIs de asistencia (tasa de puntualidad, ausentismo, tendencias)."
    Habilidades Técnicas:
      - label: Análisis de Datos & Visualización
        details: "Python (Pandas, NumPy, Matplotlib, Seaborn), SQL avanzado (PostgreSQL, MySQL), Tableau, Power BI, Excel avanzado (tablas dinámicas, Power Query)."
      - label: Data Engineering & ETL
        details: "Pentaho Data Integration (PDI), diseño de Datamarts (Modelado Estrella/Copo de Nieve), limpieza y transformación de datos, pipelines de datos."
      - label: Machine Learning & Estadística
        details: "Modelado estadístico, Scikit-learn, Redes Neuronales Gráficas (GNNs), clustering para segmentación, análisis exploratorio de datos (EDA)."
      - label: Cloud, Bases de Datos & Desarrollo
        details: "Google Cloud Platform (GCP), SQL (PostgreSQL/MySQL), Django REST Framework, React, Git/GitHub, metodologías ágiles (Scrum)."
    Certificaciones:
      - label: Dominio de Datos con Power BI — Nivel Avanzado
        details: "Levo Learning Center (Microsoft Learning Partner), 16h (2025). Dashboards, DAX, modelado de datos."
      - label: Python (Programación, Buenas Prácticas, Flask)
        details: "Codeaux (30h, 2023), Data Science Research Perú (2025), Udemy (2025)."
      - label: Desarrollo Profesional (PRONABEC)
        details: "Resolución de problemas, Trabajo en equipo, Emprendimiento, Prácticas preprofesionales (2024-2025)."
    Idiomas:
      - label: Español
        details: Nativo
      - label: Inglés
        details: A2 — Actualmente cursando preparación B1
    Liderazgo y Voluntariado:
      - company: Hackathon de Unimarquinos
        position: Staff Organizador
        highlights:
          - "Coordiné la logística de un evento tecnológico universitario, facilitando la participación de equipos multidisciplinarios en proyectos de innovación basados en datos."
      - company: Parroquia La Sagrada Familia de Nazareth
        position: Coordinador de Coro
        location: Lurín, Lima
        start_date: 2023-01
        end_date: present
        highlights:
          - "Planificación, coordinación de ensayos y gestión de un equipo de +15 integrantes."
design:
  theme: engineeringresumes
  header:
    alignment: center
  section_titles:
    type: with_full_line
  typography:
    line_spacing: 0.5em
    bold:
      section_titles: true
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.3cm
    space_between_text_based_entries: 0.15cm
