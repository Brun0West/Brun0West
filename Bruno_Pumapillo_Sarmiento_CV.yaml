cv:
  name: Bruno Pumapillo Sarmiento
  location: Lima, Perú
  email: thulobruno@gmail.com
  phone: +51 916 223 067
  website: https://brun0west.github.io/Brun0West/
  social_networks:
    - network: LinkedIn
      username: bruno-pumapillo-sarmiento
  custom_connections: []
  sections:
    Resumen Profesional:
      - >
        Estudiante de 9° ciclo de Ingeniería de Software en la Universidad Nacional Mayor de San Marcos (UNMSM), perteneciente al tercio superior. Enfocado en la Analítica de Datos y Business Intelligence, con capacidad para transformar datos complejos en decisiones estratégicas. Experto en el ciclo completo del dato: desde la ingeniería de datos (ETL) y modelado de Datamarts hasta la creación de dashboards de alto impacto. Sólida base en algoritmos de optimización, machine learning y desarrollo de software escalable.
    Formación Académica:
      - institution: Universidad Nacional Mayor de San Marcos
        area: Ingeniería de Software
        degree: Ingeniería de Sistemas e Informática
        start_date: 2022-03
        end_date: 2026-12
        location: Lima, Perú
        highlights:
          - Tercio Superior académico
          - "Becario del Estado: Beca Permanencia - PRONABEC (desde 2023)"
    Habilidades:
      - label: Data Engineering & BI
        details: Pentaho Data Integration (PDI), procesos ETL, Diseño de Datamarts (Modelado Estrella/Copo de Nieve), Tableau.
      - label: Análisis & IA
        details: Python (Pandas, NumPy), Redes Neuronales Gráficas (GNNs), Clustering para segmentación.
      - label: Bases de Datos & Cloud
        details: SQL (PostgreSQL/MySQL), Google Cloud Platform (GCP).
      - label: Desarrollo Software
        details: Django (REST Framework), React, Vite, Java, Git/GitHub.
    Proyectos Académicos:
      - company: Sistema de Inteligencia de Negocios para la Segmentación de Productores (MIDAGRI)
        position: Data Engineer & BI Analyst
        start_date: 2024-04
        end_date: 2024-06
        highlights:
          - "Responsabilidades: Diseño del modelo conceptual y físico del Datamart en Google Cloud Platform. Implementé el flujo ETL en Pentaho para integrar 28 fuentes de datos de la encuesta ENA."
          - "Logros: Se logró automatizar la unificación de datos heterogéneos, permitiendo la creación de un dashboard en Tableau que identifica segmentos críticos de productores para la focalización de políticas públicas."
      - company: Investigación de Redes Neuronales Gráficas (GNNs) para Datos Complejos
        position: Investigador en IA / Data Scientist
        highlights:
          - "Responsabilidades: Implementación de arquitecturas GAT y GraphSAGE utilizando Python para el análisis de estructuras de grafos de gran escala (millones de nodos)."
          - "Logros: Se demostró la eficacia de los mecanismos de paso de mensajes para predecir propiedades en redes moleculares y sociales, optimizando el rendimiento mediante técnicas de muestreo como GraphSAINT."
      - company: "SCARF: Control de Asistencia mediante Reconocimiento Facial"
        position: Backend Developer & Data Manager
        highlights:
          - "Responsabilidades: Desarrollo de la lógica de negocio y API REST en Django. Diseño del pipeline de datos para el almacenamiento y procesamiento de imágenes y registros de asistencia."
          - "Logros: Se integró un sistema automático que redujo el margen de error en el registro manual y generó visualizaciones estadísticas (dashboards) para el monitoreo de asistencia en tiempo real."
      - company: Sistema IoT de Disuasión de Aves con Optimización PSO
        position: Desarrollador de Algoritmos de Optimización
        highlights:
          - "Responsabilidades: Programación en Python/C++ para el ESP32, aplicando el algoritmo Particle Swarm Optimization (PSO) para la planificación de rutas."
          - "Logros: Se optimizó la trayectoria de los mecanismos de disuasión, mejorando la cobertura de protección en cultivos agrícolas y reduciendo los daños por aves en un entorno monitoreado."
      - company: "RapidEats: Plataforma de Gestión de Pedidos"
        position: Frontend Engineer
        highlights:
          - "Responsabilidades: Desarrollo de la interfaz interactiva con React y Vite, gestionando estados globales complejos y consumo de APIs mediante Axios."
          - "Logros: Se creó una interfaz de autoservicio fluida que integra en tiempo real el catálogo de productos con el inventario del backend, mejorando la experiencia de usuario en el flujo de compra."
    Voluntariados:
      - company: Parroquia La Sagrada Familia de Nazareth (Coro San Manuel Gonzales García)
        position: Coordinador de Coro
        location: Lurín, Lima
        start_date: 2023-01
        end_date: present
        highlights:
          - Rol de liderazgo en la coordinación de ensayos y presentaciones.
      - company: Hackathon de Unimarquinos
        position: Staff Organizador de Evento
        highlights:
          - Apoyo en la logística y organización general de un evento tecnológico, facilitando un entorno para la innovación y el desarrollo de proyectos.
      - company: Centro Educativo
        position: Voluntario de Soporte Técnico y Mantenimiento
        highlights:
          - Participación en tareas de diagnóstico, limpieza y reparación básica de equipos de cómputo, aplicando conocimientos técnicos para mantener la infraestructura operativa.
    Idiomas:
      - label: Español
        details: Nativo
      - label: Inglés
        details: Básico (Certificación A2)
    Certificaciones:
      - label: Certificación en Power BI
        details: Nivel Intermedio
      - label: Cursos de Desarrollo Profesional (PRONABEC)
        details: >-
          Resolución de problemas (Abril 2024), Trabajo en equipo (Sep 2024), Emprendimiento (Marzo 2025), Orientación sobre prácticas preprofesionales (Marzo 2025).
      - label: Bienestar, Ética y Valores (PRONABEC)
        details: >-
          Construyendo mi bienestar (I, II, III), Desarrollo comunitario ética y valores, Técnicas para afrontar la ansiedad y el estrés, Determinación.
design:
  theme: engineeringresumes
  header:
    alignment: center
  section_titles:
    type: with_full_line
  typography:
    line_spacing: 0.6em
    bold:
      section_titles: true
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.4cm
    space_between_text_based_entries: 0.2cm
